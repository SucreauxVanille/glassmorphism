<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Glass Demo</title>

</head>
<body>
<div class="back">
  <div class="header">
    ヘッダー
    <div class="menu pc">メニュー</div>
  </div>
  <div class="menu sp">メニュー</div>
</div>


<style>
.back {
  background: url("./sample.jpg");
  background-size: cover;
  background-position: center;
  min-height: 100vh;
}
.header {
  box-shadow: 0 0 8px #00000024;
  padding: 32px;
  background: #FFFFFF56;
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}
.menu {
  color: white;
  background: blue;
  width: 100%;
  padding: 10px;
  box-sizing: border-box;
  position: fixed;
  left: 0;
  bottom: 0;
}
.pc {
  display: none;
}
.sp {
  display: block;
}
</style>
</body>
</html>
